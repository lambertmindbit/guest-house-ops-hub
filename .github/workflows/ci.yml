name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Ephemeral Postgres for this run only — fully isolated, no production data,
    # no secrets. postgres:16 ships btree_gist (needed by the exclusion constraint).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ota_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ota_test
      # No pooler in CI — migrations use the same local Postgres directly.
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ota_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ota_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Type-check the WHOLE tree, tests included. `next build` only checks the
      # app graph, and vitest doesn't type-check at all, so without this a type
      # error in a test file ships silently.
      - name: Typecheck
        run: npx tsc --noEmit

      # Raw SQL bypasses the Prisma tenant extension, so an unscoped $queryRaw over
      # a tenant table leaks across one owner's properties (the freeRooms bug class).
      - name: Tenant SQL scope guard
        run: node scripts/check-tenant-sql.mjs

      # Docs rot silently. Deleting a doc leaves every reference to it dangling,
      # and the .html set is GENERATED — edit a .md, forget `npm run docs:html`,
      # and the published HTML quietly says something the Markdown no longer does.
      # Both failures shipped before this step existed.
      - name: Docs
        run: |
          node scripts/check-docs.mjs
          npm run docs:html
          if ! git diff --quiet -- '*.html'; then
            echo "::error::Generated HTML is stale. Run 'npm run docs:html' and commit the result."
            git diff --stat -- '*.html'
            exit 1
          fi
          echo "✓ generated HTML matches the Markdown"

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # The Python agent sidecar (assistant-agent/). Its deterministic booking flows
  # and the empty-turn retry chain run with a faked seam + faked runners — no
  # network, no LLM, no API key needed. Until now the agent shipped to Cloud Run
  # with zero automated coverage; this gate ends that.
  agent-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: assistant-agent/requirements-dev.txt

      - name: Install agent deps
        run: pip install -r assistant-agent/requirements-dev.txt

      - name: Run agent tests
        working-directory: assistant-agent
        run: pytest -q
