# Local Postgres for parity / offline dev. Dev currently points DATABASE_URL at
# Supabase, but this lets you run `docker compose up -d db` for a local DB.
# Postgres 16 includes the btree_gist extension the exclusion constraint needs.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ota
      POSTGRES_PASSWORD: ota
      POSTGRES_DB: ota
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
