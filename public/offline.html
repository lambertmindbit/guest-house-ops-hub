<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline — Ops Hub</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, -apple-system, sans-serif; background: #f2f2f7; color: #1c1c1e; }
    .box { text-align: center; padding: 24px; max-width: 320px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #6b7280; font-size: 14px; line-height: 1.5; }
    button { margin-top: 16px; padding: 10px 18px; border: 0; border-radius: 10px; background: #006b5f; color: #fff; font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="box">
    <h1>You're offline</h1>
    <p>Ops Hub needs a connection to load fresh bookings and availability. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
