name = "ota-email-ingest"
main = "src/worker.js"
compatibility_date = "2025-06-01"

# --- Plug in (NOT secret — safe to commit once filled) ---
[vars]
INGEST_URL = "https://YOUR-APP.vercel.app/api/ingest/email"
